<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Left accent bar -->
  <rect x="80" y="110" width="4" height="200" rx="2" fill="url(#emerald)"/>

  <!-- Wordmark -->
  <text
    x="112"
    y="240"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-4"
    fill="url(#emerald)"
  >tock</text>

  <!-- Tagline -->
  <text
    x="112"
    y="305"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="400"
    fill="#ffffff"
    opacity="0.9"
  >Cron jobs that actually work.</text>

  <!-- Sub-tagline -->
  <text
    x="112"
    y="355"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#6ee7b7"
    opacity="0.75"
  >HTTP-native · Observable</text>

  <!-- Badge -->
  <rect x="80" y="500" width="344" height="44" rx="22" fill="#1a1a1a" stroke="#34d399" stroke-width="1.5"/>
  <text
    x="252"
    y="527"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#34d399"
  >HTTP-native cron scheduler</text>

  <!-- Domain watermark -->
  <text
    x="1120"
    y="580"
    text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#ffffff"
    opacity="0.3"
  >tock.run</text>
</svg>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tock — HTTP Cron Job Scheduler</title>
    <meta
      name="description"
      content="Tock fires HTTP requests on a schedule. Docker-native, and fully observable with response logs. Zero-daemon cron for modern stacks."
    />
    <link rel="canonical" href="%BASE_URL%" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%BASE_URL%" />

      property="og:description"

    <meta property="og:image" content="%BASE_URL%/og.svg" />

    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tock — HTTP Cron Job Scheduler" />

      name="twitter:description"
      content="Tock fires HTTP requests on a schedule. Docker-native, and fully observable with response logs."
    />
    <meta name="twitter:image" content="%BASE_URL%/og.svg" />

    <!-- Favicon + theme -->

          {
            "@type": "Offer",
            "name": "Tock Pro Yearly",
            "price": "10.00",
            "priceCurrency": "USD",
            "billingIncrement": "P1Y"
          }
        ]
      }
    </script>
  </head>
  <body class="subpixel-antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
